# Automated dependency updates. One ecosystem per published surface.
#
# Deliberately NOT covered:
# - r/jsslintr/src/rust/ — vendored, regenerated by
#   r/jsslintr/tools/vendor-jsslint-core.sh; updates flow from rust/, never
#   directly.
# - rust/vendor/printpdf-0.3.4 — a patched vendored copy (see its NOTICE.md
#   and specs/025-report-html-pdf/spec.md); genpdf/printpdf are ignored below
#   because genpdf 0.2.0 pins printpdf =0.3.4 and the 0.12 rewrite has an
#   incompatible API — a naive bump breaks the PDF report.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: cargo
    directory: "/rust"
    schedule:
      interval: weekly
    ignore:
      # Pinned pair — see header comment and specs/025-report-html-pdf.
      - dependency-name: genpdf
      - dependency-name: printpdf
    groups:
      rust-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/vscode-extension"
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
