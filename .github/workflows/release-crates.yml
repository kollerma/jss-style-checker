name: release-crates

# Spec 018 Phase 6 — publishes jsslint-core + jsslint-cli to crates.io
# and cross-compiles jsslint-cli release binaries to a GitHub Release.
# Triggered by a `v*-cli` tag (mirrors vscode-publish.yml's `v*-vscode`
# convention: one tag suffix per independently-released component).
#
# One-time manual setup required before this can run:
#   - A crates.io API token with publish rights for jsslint-core and
#     jsslint-cli (crates.io Account Settings -> API Tokens), stored
#     as the CARGO_REGISTRY_TOKEN repository secret.
#     (crates.io also supports GitHub OIDC "Trusted Publishing" as a
#     token-free alternative — worth switching to once set up per
#     crate on crates.io, not used here to keep this workflow on the
#     well-established token flow.)

on:
  push:
    tags:
      - 'v*-cli'
  workflow_dispatch: {}  # dry run: `cargo publish --dry-run` + cross-compiled binaries, no publish/upload

permissions:
  contents: write  # to upload release binaries

jobs:
  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish jsslint-core
        working-directory: rust
        # workflow_dispatch runs `--dry-run`: packages and builds jsslint-core
        # for verification without uploading it to crates.io. continue-on-error
        # only applies to the dry run — `cargo publish --dry-run` also fails
        # if this exact version is already live on crates.io, which is an
        # expected/harmless outcome for a dry run re-run, not a real error.
        continue-on-error: ${{ github.event_name != 'push' }}
        run: cargo publish -p jsslint-core --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }} ${{ github.event_name != 'push' && '--dry-run' || '' }}

      - name: Wait for jsslint-core to be indexed
        if: github.event_name == 'push'
        # jsslint-cli depends on jsslint-core as a workspace path
        # dependency; `cargo publish` rewrites that to a registry
        # dependency, which requires the just-published version to
        # already be resolvable on crates.io's index.
        run: sleep 30

      - name: Publish jsslint-cli
        working-directory: rust
        # On a dry run, jsslint-core was never actually published above, so
        # jsslint-cli's registry-rewritten dependency won't resolve either —
        # `cargo publish --dry-run` here still exercises packaging/build for
        # jsslint-cli itself, but is expected to fail the dependency-resolution
        # check unless jsslint-core is already published at this version.
        # continue-on-error only applies to the dry run, same reasoning as above.
        continue-on-error: ${{ github.event_name != 'push' }}
        run: cargo publish -p jsslint-cli --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }} ${{ github.event_name != 'push' && '--dry-run' || '' }}

  release-binaries:
    needs: publish-crates
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: jsslint-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: jsslint-linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: jsslint-macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: jsslint-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: jsslint-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: rust
        run: cargo build --release --locked -p jsslint-cli --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          src="rust/target/${{ matrix.target }}/release/jsslint"
          if [ "${{ runner.os }}" = "Windows" ]; then src="${src}.exe"; fi
          cp "$src" "${{ matrix.artifact_name }}"

      - name: Upload build artifact
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

      - name: Upload to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
