name: publish-badges

# Spec 017 follow-up: generate the precision / recall / F1 badge
# JSON files from the local eval databases and push them to the
# `gh-pages` branch where shields.io's endpoint pattern can read
# them.
#
# Since the 1.0.0 release (spec 018), the aggregates are PINNED —
# eval.badge.PINNED_ITERATION_LABEL / PINNED_RECALL_TIMESTAMP — not
# "whatever's latest in precision-history.db". Without pinning, the
# badges would silently drift with every push to this dev repo
# (jss-style-checker-dev), even though the public jss-style-checker
# repo only picks up a new push (and re-runs this workflow) when the
# `public` branch is explicitly merged from `main` and pushed there.
# Re-pin (bump those two constants) when cutting the next release.
#
# Trigger: every push to `main`. Idempotent — re-running with the
# same DB state produces byte-identical badge JSON, so the
# gh-pages commit is a no-op when nothing changed.
#
# Permissions: `contents: write` so the action can push to
# gh-pages. The default GITHUB_TOKEN is sufficient.

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  # Shared with publish-web.yml: both push to the same gh-pages branch
  # on every push to main, and each only touches its own subdirectory
  # (badges/ here, the site root there) — but two workflows racing to
  # fetch/commit/push gh-pages independently would non-fast-forward
  # reject whichever pushes second. Sharing the group serializes them.
  group: gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install jss-lint (dev extras)
        run: pip install -e '.[dev]'

      - name: Compute aggregates
        id: agg
        run: |
          set -euo pipefail
          # Both aggregates are PINNED (spec 018, the 1.0.0 release) to
          # eval.badge.PINNED_ITERATION_LABEL / PINNED_RECALL_TIMESTAMP
          # rather than "whatever's latest in precision-history.db" —
          # see that module's docstring. The `recall_history` table is
          # created lazily when `eval-jss recall` runs; on fresh
          # checkouts it may be absent, so apply the schema (idempotent)
          # before querying — recall just falls back to 0.0 when the
          # pinned snapshot doesn't exist.
          read -r precision recall f1 < <(python - <<'PY'
          import sqlite3
          from pathlib import Path

          from eval import badge
          from eval.history import _SCHEMA  # noqa: PLC2701 (intentional internal use)

          db = Path("eval/precision-history.db")
          cx = sqlite3.connect(db)
          cx.executescript(_SCHEMA)
          cx.close()

          precision = badge.pinned_precision_aggregate(db)
          recall = badge.pinned_recall_aggregate(db)
          f1 = 0.0 if precision + recall == 0 else 2 * precision * recall / (precision + recall)

          print(precision, recall, f1)
          PY
          )
          echo "precision=$precision" >> "$GITHUB_OUTPUT"
          echo "recall=$recall" >> "$GITHUB_OUTPUT"
          echo "f1=$f1" >> "$GITHUB_OUTPUT"

      - name: Generate badge JSON
        run: |
          mkdir -p _badges
          python -m eval.badge precision ${{ steps.agg.outputs.precision }} > _badges/precision.json
          python -m eval.badge recall    ${{ steps.agg.outputs.recall    }} > _badges/recall.json
          python -m eval.badge f1        ${{ steps.agg.outputs.f1        }} > _badges/f1.json

      - name: Publish to gh-pages
        # Force-push the contents of _badges/ to gh-pages under
        # `badges/`. Using a worktree-style checkout keeps the
        # working tree clean.
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          # Stage badges to a temp dir.
          tmpdir=$(mktemp -d)
          cp _badges/*.json "$tmpdir/"
          # Fetch (or create) gh-pages.
          if git fetch origin gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
          mkdir -p badges
          cp "$tmpdir"/*.json badges/
          git add badges/
          if git diff --cached --quiet; then
            echo "no badge changes; skipping commit"
            exit 0
          fi
          git commit -m "badges: refresh from main@${GITHUB_SHA::8}"
          git push origin gh-pages
