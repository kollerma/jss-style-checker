name: release-npm-wasm

# Spec 018 Phase 6 — publishes the jsslint-wasm browser/npm binding.
# Triggered by a `v*-wasm` tag (mirrors vscode-publish.yml's
# `v*-vscode` convention).
#
# `wasm-pack build --target bundler` derives the npm package name from
# the crate's [package] name — already `jsslint-wasm`, matching the
# chosen npm name, so no rename step is needed here.
#
# Auth: OIDC Trusted Publishing — no token/secret. Configure a trusted
# publisher for the `jsslint-wasm` package on npmjs.com pointing at this
# repo + this workflow file (release-npm-wasm.yml); the `id-token: write`
# permission below lets `npm publish` mint a short-lived credential via
# GitHub Actions OIDC and attach provenance automatically. Requires
# npm >= 11.5.1, installed in the publish job below (Node 20 ships npm 10).

on:
  push:
    tags:
      - 'v*-wasm'
  workflow_dispatch: {}  # dry run: builds the wasm package, skips the npm publish step

permissions:
  contents: read
  id-token: write  # for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Build
        working-directory: rust/jsslint-wasm
        run: wasm-pack build --release --target bundler -- --locked

      - name: Upload package artifact
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v7
        with:
          name: jsslint-wasm-pkg
          path: rust/jsslint-wasm/pkg

      - uses: actions/setup-node@v7
        with:
          # Current LTS. Node 20 is EOL and npm 12 dropped support for it,
          # which made `npm install -g npm@latest` fail (EBADENGINE) at the
          # 1.1.0 release. Node here only drives `npm publish` — the wasm
          # itself is built by wasm-pack above, node-independent.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; upgrade in case
      # the runner's bundled npm is older.
      - name: Upgrade npm for OIDC trusted publishing
        if: github.event_name == 'push'
        run: |
          npm install -g npm@latest
          npm --version

      - name: Publish to npm
        if: github.event_name == 'push'
        working-directory: rust/jsslint-wasm/pkg
        # No NODE_AUTH_TOKEN: with a trusted publisher configured for this
        # repo + workflow, npm authenticates via OIDC and attaches provenance.
        run: npm publish --access public --provenance
