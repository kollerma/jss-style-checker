name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Supersede in-flight runs when a PR branch gets a newer push, instead of
# letting stale runs finish. main pushes get a stable group so they still
# run to completion.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,lsp]' -e tests/fixtures/stub_journal

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest

  # The VS Code extension's TypeScript compile. Without this, a breaking
  # dev-dependency bump (e.g. the TypeScript 7 native port dropping
  # automatic @types discovery) merges green and only fails at publish
  # time — vscode-publish.yml is tag-triggered and never runs on PRs.
  vscode:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Install
        working-directory: vscode-extension
        run: npm ci

      - name: Compile
        working-directory: vscode-extension
        run: npm run compile

  # Spec 018 — Rust core (jsslint-core/jsslint-cli/jsslint-wasm/
  # jsslint-py). Every jsslint-core/jsslint-cli test that differentially
  # checks output against the real jss-lint CLI looks specifically for
  # `.venv/bin/jss-lint` at the repo root (skipping gracefully, not
  # failing, if it's absent) — so this job builds that exact venv
  # itself, matching what every developer's local checkout has, rather
  # than relying on the `test` job's ambient (non-venv) Python install.
  # The jsslintr R package isn't part of the Cargo workspace and needs
  # a much heavier, non-standard toolchain (see the commit history for
  # 018-rust-core's jsslint-r chunk) — deliberately out of scope here.
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build the Python venv the Rust tests look for
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e '.[dev,lsp]' -e tests/fixtures/stub_journal

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Set up Node (for the WASM binding's differential test)
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Install wasm-bindgen-cli (version-matched to the wasm-bindgen crate)
        run: |
          version=$(grep -A1 '^name = "wasm-bindgen"' rust/Cargo.lock | grep version | head -1 | cut -d '"' -f2)
          cargo install wasm-bindgen-cli --version "$version"

      - name: cargo fmt --check
        working-directory: rust
        run: cargo fmt --all --check

      - name: cargo clippy
        working-directory: rust
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo build
        working-directory: rust
        run: cargo build --workspace --locked

      - name: cargo test
        working-directory: rust
        run: cargo test --workspace --locked

  # Constitution §XIII — the corpus-backed Rust/Python parity sweep. The
  # parity suites skip gracefully when the (gitignored, SHA256-pinned)
  # eval corpus isn't materialized, which means the plain `test`/`rust`
  # jobs above never actually exercise the headline byte-parity invariant
  # on real papers. This job materializes the corpus (cached by manifest
  # hash — a network fetch only happens when eval/corpus-manifest.csv
  # changes), builds the PyO3 oracle, and runs the corpus-dependent parity
  # tests on both sides.
  #
  # It also guards the generated paper stats (`generate_paper_stats
  # --check`): that check MUST run here and not in a lighter job, because
  # the committed stats are generated in a full dev environment — the
  # pytest collection count includes the PyO3-oracle parity tests, which
  # only collect when `maturin develop` has run (importorskip drops them
  # otherwise, and the count mismatch reads as stats drift). fetch-depth: 0
  # because the generator counts commits via git rev-list.
  parity:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build the Python venv the parity tests look for
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e '.[dev,lsp]' -e tests/fixtures/stub_journal

      - name: Restore the eval corpus
        id: corpus-cache
        uses: actions/cache@v6
        with:
          # Only the fetched (gitignored) payloads — never committed
          # examples, so a stale cache can't shadow checked-in files.
          path: examples/cran_*
          key: eval-corpus-${{ hashFiles('eval/corpus-manifest.csv') }}

      - name: Fetch the eval corpus (cache miss only)
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: .venv/bin/eval-jss corpus fetch

      - name: Materialize the recall corpus
        run: .venv/bin/python -m eval.recall_corpus_scaffold

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build the in-process PyO3 oracle
        working-directory: rust/jsslint-py
        run: |
          source ../../.venv/bin/activate
          maturin develop --release --locked

      - name: Paper stats up to date
        run: .venv/bin/python -m tools.generate_paper_stats --check

      - name: Python-side parity (PyO3 oracle vs texlint)
        run: .venv/bin/python -m pytest tests/unit/test_jsslint_parity.py -q

      - name: Rust-side parity (jsslint vs .venv/bin/jss-lint)
        working-directory: rust
        run: cargo test -p jsslint-core -p jsslint-cli --locked

  # macOS coverage. CI was Linux-only while two real breakages (a PyO3
  # link failure in `cargo test --workspace` and a terminal-width test
  # assumption) were macOS-only and invisible here. Corpus-free: the
  # corpus-dependent parity cases skip, everything else runs.
  macos:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build the Python venv
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e '.[dev,lsp]' -e tests/fixtures/stub_journal

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Set up Node (for the WASM binding's differential test)
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Install wasm-bindgen-cli (version-matched to the wasm-bindgen crate)
        run: |
          version=$(grep -A1 '^name = "wasm-bindgen"' rust/Cargo.lock | grep version | head -1 | cut -d '"' -f2)
          cargo install wasm-bindgen-cli --version "$version"

      - name: Build the in-process PyO3 oracle
        working-directory: rust/jsslint-py
        run: |
          source ../../.venv/bin/activate
          maturin develop --release --locked

      - name: Pytest
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          .venv/bin/python -m pytest -q

      - name: cargo test
        working-directory: rust
        run: cargo test --workspace --locked
