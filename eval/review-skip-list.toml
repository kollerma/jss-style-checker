# Rules whose AI-label precision is historically low.
#
# `eval-jss review` skips these rule ids entirely so the violations
# flow straight to `human-review`. Add rules here as Step 3 lands them
# and observes model blind spots; remove them once the model improves.
#
# Format: each entry is a `{rule_id = "...", reason = "..."}` table.
# The `reason` field is documentation only — it is not interpreted.
#
# Bare-string entries (just `"JSS-FOO-123"`) are also accepted.
#
# Examples (commented; uncomment / adapt when Step 3 has the rule
# catalogue that makes each one a live concern):
#
#   { rule_id = "JSS-CODE-003", reason = "Qwen3 mislabels param=value inside \\code{}" },
#
#   { rule_id = "JSS-SRC-001", reason = "Qwen3 rubber-stamps numeric-assertion messages as TP; see spec.md Assumptions for the 2026-04-23 observation" },

skip_rules = []

# Spec 004 pre-populated entries — rules whose violations bypass AI labelling
# entirely. See specs/004-jss-rule-modules/contracts/ai-skip-list.md.
# Removal policy: each removal MUST include rationale in the removing PR.

[[rules]]
rule_id       = "JSS-CITE-004"
reason        = "Regex-over-prose with code/verbatim masking; AI labeller rubber-stamps matches."
added_in_spec = "004"

[[rules]]
rule_id       = "JSS-OPER-002"
reason        = "Polarity inversion: Qwen3 systematically labels manuscripts that use '^T' as FP, claiming '^T complies with the rule'. The rule says use '\\top' NOT '^T'. Even with the per-rule polarity hint in eval/review.py::_RULE_HINTS, 22/22 AI verdicts during iter-2 review were wrong-direction."
added_in_iter = "5"

[[rules]]
rule_id       = "JSS-REFS-002"
reason        = "BibTeX title-case tight heuristic; Qwen3 rubber-stamps 'looks-like-a-title' cases (spec 002 note)."
added_in_spec = "004"

# Removed 2026-04-24 (iteration 2): with the new prompt that anchors
# the violation line/column ('>>'/'^' markers) and the per-rule
# polarity hints in eval/review.py::_RULE_HINTS, these pattern-match
# rules should be tractable for the AI. Verify via `eval-jss benchmark`
# before removing more.
#
# - JSS-MARKUP-001 (language names) — caret marks the bare token; hints
#   exclude filenames / math / initials.
# - JSS-HOUSE-001 (e.g./i.e. comma) — caret marks the period; trivial
#   substring check after the marker.
# - JSS-OPER-001 ($p$~value) — caret marks the lowercase letter; hint
#   names the trigger nouns explicitly.
# - JSS-CODE-003 (operator spacing) — caret in \code{...}; hint
#   excludes single dotted/hyphenated identifiers and scientific
#   notation.
# - JSS-ABBR-001 (uppercase abbreviation) — caret on the multi-letter
#   dotted token.
# - JSS-REFS-005 (journal abbreviation) — full bib entry rendered as
#   the snippet (`.bib` files show the whole @entry block).

[[rules]]
rule_id       = "JSS-CAP-001"
reason        = "Title-style heuristic; AI labeller lacks principal-word dictionary."
added_in_spec = "004"

[[rules]]
rule_id       = "JSS-CAP-002"
reason        = "Sentence-style heuristic on section titles; Qwen3 blind spot."
added_in_spec = "004"

[[rules]]
rule_id       = "JSS-CAP-003"
reason        = "Sentence-style heuristic on captions; Qwen3 blind spot."
added_in_spec = "004"

[[rules]]
rule_id       = "JSS-CAP-004"
reason        = "Keyword sentence-case heuristic; short fields with limited context — AI unreliable."
added_in_spec = "004"
