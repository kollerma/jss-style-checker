# Rules whose AI-label precision is historically low.
#
# `eval-jss review` skips these rule ids entirely so the violations
# flow straight to `human-review`. Add rules here as Step 3 lands them
# and observes model blind spots; remove them once the model improves.
#
# Format: each entry is a `{rule_id = "...", reason = "..."}` table.
# The `reason` field is documentation only — it is not interpreted.
#
# Bare-string entries (just `"JSS-FOO-123"`) are also accepted.

skip_rules = []

# Last revision: 2026-05-01 after the full 934-row gold benchmark
# (eval/labeler-benchmark-summary.md). Each entry below is justified
# by a per-rule agreement number on the human gold set; rules that
# at least one available model handles at ≥94% have been removed.
# The ones still here either (a) both models < 75% agreement, or
# (b) both models ≥97% uncertain on the rule — useless either way.

[[rules]]
rule_id       = "JSS-CAP-003"
reason        = "Both models fail. Bonsai 40% (accepts 28/47 FPs as TPs), Qwen3 63%. The captions sentence-style heuristic is too loose — both labellers confuse 'figure caption with proper-noun phrase' for genuine title-case. Iter-71 benchmark."
added_in_spec = "004"

