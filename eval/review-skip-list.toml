# Rules whose AI-label precision is historically low.
#
# `eval-jss review` skips these rule ids entirely so the violations
# flow straight to `human-review`. Add rules here as Step 3 lands them
# and observes model blind spots; remove them once the model improves.
#
# Format: each entry is a `{rule_id = "...", reason = "..."}` table.
# The `reason` field is documentation only — it is not interpreted.
#
# Bare-string entries (just `"JSS-FOO-123"`) are also accepted.
#
# Examples (commented; uncomment / adapt when Step 3 has the rule
# catalogue that makes each one a live concern):
#
#   { rule_id = "JSS-CODE-003", reason = "Qwen3 mislabels param=value inside \\code{}" },
#
#   { rule_id = "JSS-SRC-001", reason = "Qwen3 rubber-stamps numeric-assertion messages as TP; see spec.md Assumptions for the 2026-04-23 observation" },

skip_rules = []

# Spec 004 pre-populated entries — rules whose violations bypass AI labelling
# entirely. See specs/004-jss-rule-modules/contracts/ai-skip-list.md.
# Removal policy: each removal MUST include rationale in the removing PR.

[[rules]]
rule_id       = "JSS-CITE-004"
reason        = "Regex-over-prose with code/verbatim masking; AI labeller rubber-stamps matches."
added_in_spec = "004"

