# Rules whose AI-label precision is historically low.
#
# `eval-jss review` skips these rule ids entirely so the violations
# flow straight to `human-review`. Add rules here as Step 3 lands them
# and observes model blind spots; remove them once the model improves.
#
# Format: each entry is a `{rule_id = "...", reason = "..."}` table.
# The `reason` field is documentation only — it is not interpreted.
#
# Bare-string entries (just `"JSS-FOO-123"`) are also accepted.

skip_rules = []

# Last revision: 2026-05-01 after the full 934-row gold benchmark
# (eval/labeler-benchmark-summary.md). Each entry below is justified
# by a per-rule agreement number on the human gold set; rules that
# at least one available model handles at ≥94% have been removed.
# The ones still here either (a) both models < 75% agreement, or
# (b) both models ≥97% uncertain on the rule — useless either way.

[[rules]]
rule_id       = "JSS-CAP-003"
reason        = "Both models fail. Bonsai 40% (accepts 28/47 FPs as TPs), Qwen3 63%. The captions sentence-style heuristic is too loose — both labellers confuse 'figure caption with proper-noun phrase' for genuine title-case. Iter-71 benchmark."
added_in_spec = "004"

[[rules]]
rule_id       = "JSS-CITE-004"
reason        = "Regex-over-prose with code/verbatim masking; AI labeller rubber-stamps matches. Benchmark shows 100% agreement on the 18 gold rows for both models — RETAINED defensively because the gold set is small and the FP risk is high if the rule's heuristic over-fires (e.g. on text matching '(Author, year)' inside a quote env)."
added_in_spec = "004"

[[rules]]
rule_id       = "JSS-OPER-002"
reason        = "RETAINED: Qwen3 polarity inversion (48% agreement at iter-71). Bonsai handles it well (96%) but the skip-list is single-model-agnostic; see eval/labeler-benchmark-summary.md routing notes for per-rule model selection. Move to per-rule routing when (b) lands; remove from skip-list at that time."
added_in_iter = "5"

# JSS-REFS-002 removed from skip-list 2026-06-14: the rule itself was
# retired (subsumed by REFS-006; its only corpus firing was the
# generatingfunctionology FP).

[[rules]]
rule_id       = "JSS-NAME-002"
reason        = "RETAINED: Bonsai 63% agreement (flips 13 publisher TPs → FP, hallucinating 'Springer aligns with JSS conventions'). Qwen3 100% on the same 38 rows. Like OPER-002, this is a model-routing case — when (b) lands, route NAME-002 to Qwen3 and remove from skip-list."
added_in_iter = "32"

