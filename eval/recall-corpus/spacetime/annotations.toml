The North Carolina Sudden Infant Death Syndrome (sids) data set is cited using
\citep{nc}, but there's no bibtex entry with key nc.

Citation of package maps in line 1129 is not added as violations as the package is
cited on line 964 already, but there incorrectly as package map.

Removed several violations of JSS-XREF-001 after \end{document} (line 1509).
No need to check after the end of the document.
'''

