# Hand-annotated ground truth for paper "spacetime".
#
# Annotation protocol: read the rendered manuscript end-to-end and
# record every JSS-guide violation you spot. Identity tuple is
# (rule_id, file, line); column does NOT participate. See
# eval/recall-corpus/README.md for the full protocol.
#
# Conventions (matching the v1 papers): CODE-003 carries one entry per
# offending chunk (anchored at the <<>>= line, where the Sinput
# envelope starts); bib-rule entries anchor at the entry's @-line.
# Hidden chunks (echo=FALSE) are not annotated — their code never
# appears in the rendered manuscript. Only BIB ENTRIES CITED from the
# manuscript are annotated; jss816.bib carries ~30 additional
# unreferenced legacy entries that never render.

[meta]
paper_id = "spacetime"
annotator = "Claude Code (AI annotator)"
date = "2026-06-11"
notes = """
AI-produced annotation from an independent end-to-end read of
jss816.Rnw (1566 loc) and the cited subset of jss816.bib; the linter
was not consulted before annotating (reconciliation per README step 5
afterwards). Pending human verification. This is the published JSS
v51i07 paper kept as a living vignette, so prose style is largely
clean; defects concentrate in metadata (\\title markup without
\\Plaintitle, \\author with logos and no \\Plainauthor), package names
wrapped in \\code{} instead of \\pkg{}, unspaced chunk code, and the
bibliography (missing DOIs, unmarked package names in titles).
Out-of-catalogue defects noticed but not annotatable: \\cite{nc} has
no bib entry; trailing non-LaTeX notes after \\end{document}.
Linter FPs observed here (not annotated): XREF-001 on notes after
\\end{document} (lines 1542/1546/1565); REFS-003 on R News / OGC
entries that have no DOI; REFS-006 on the lowercase package-name
first word of the jss816 self-citation title.
Borderline, left unannotated: require(pkg, quietly = TRUE) guard
idiom (unquoted first arg); \\code{xts}/\\code{sp} where class vs.
package reading is ambiguous; lowercase "figure/table/section \\ref".
"""

