[meta]
paper_id = "trueskill"
annotator = "Manuel Koller"
date = "2026-06-22"
notes = '''
The author uses both P and P for probability.
 - lowercase p(·) = a density over a continuous variable (skills s, performances p, differences d): priors, posteriors, likelihoods-as-densities.
 - uppercase P(·) = the probability of the discrete result r (the game outcome — win/draw/loss): a probability mass.
Only the uppercase P(·) should become \Prob. The lowercase p(·) should stay as italic p. I've annotated accordingly.

Line 1573 and others use {equation} but also set a tag, e.g.,
    \begin{equation}\label{eq:p*_d} \tag{\texttt{approx()}}
Since there's a tag, there's no equation number. approx, the tag, is referenced in code -> FP

Listings lst:tb_lose and lst:d2 are not marked as unreferenced as they are referenced implicitly on line 1912, where it says:
    The codes \ref{lst:d1} to \ref{lst:tb_win}

'''

