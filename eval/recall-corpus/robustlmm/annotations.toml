# Hand-annotated ground truth for paper "robustlmm".
#
# Annotation protocol: read the rendered manuscript end-to-end and
# record every JSS-guide violation you spot. Identity tuple is
# (rule_id, file, line); column does NOT participate. See
# eval/recall-corpus/README.md for the full protocol.

[meta]
paper_id = "robustlmm"
annotator = "Manuel Koller"
date = "2026-05-10"
notes = '''
REFS-003 (DOI advisory) entries are annotated even though they are
info-severity: every flagged entry has a DOI on crossref.org that
the bib does not record. Eleven of sixteen REFS-003 hits are
linter false negatives (the rule only fires on a narrow subset of
entry types) — see the JSS-REFS-003 entry-type-coverage follow-up
in roadmap/follow-ups.md.

Cross-paper patterns confirmed against pmclust:

  * JSS-CAP-002 misses every \section[short]{long} form (9 instances
    in this paper alone).
  * JSS-REFS-004 misses cases where a package name appears in note=
    rather than title=, and where MARKUP-002's package-name lookup
    would have helped (9 instances).
  * JSS-MARKUP-002 and JSS-MARKUP-003 do not see inside \texttt{...}
    (line 591, both rules on one line — \texttt{MASS} should be
    \pkg{MASS} and \texttt{hubers} should be \code{hubers}).

Linter false positives skipped (filed as roadmap follow-ups):

  * JSS-CAP-003 over-eager on technical identifiers in captions
    (lines 608, 654 — N/N, RSEn, t3/t3 in stats notation).
  * JSS-REFS-006 _starts_with_package_idiom exemption breaks when
    the lowercase package name is wrapped in {} (bib lines 18, 94).
'''

