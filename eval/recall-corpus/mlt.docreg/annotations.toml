# Goal 2 (rule coverage): closes STRUCT-003 (absent) + de-thins CAP-003 / BIBTEX-003.
#
# The [[violations]] below are SEEDED from precision-review
# verdicts (eval.db, 2026-06-17): each is a review-confirmed
# TRUE POSITIVE — VERIFY it, and add the false negatives the
# linter missed (those are not in eval.db). Reviewed FALSE
# POSITIVES are listed (commented) at the bottom: do NOT add
# them as violations, but confirm the FP judgement as you read.
#
# JSS-REFS-003 is NOT seeded here — it is populated separately by
# `python -m eval.crossref_doi_lookup` (records the actual DOI).

[meta]
paper_id = "mlt.docreg"
annotator = "Manuel Koller"
date = "2026-06-29"
notes = '''
Seeded from precision review on 2026-06-17: 56 confirmed-TP entries to verify, 18 reviewed FPs recorded below.

JSS-OPER-004: the paper defines \Ex (= \mathbb{E}) and redefines \Prob (= \mathbb{P}) in defs.tex:84-85 instead of the jss.cls shortcuts \E (= \mathsf{E}) / \Prob (= \mathsf{P}). Both the DEFINITION SITES (defs.tex:84-85, the root cause) and each body OCCURRENCE are annotated as OPER-004 false negatives (the linter misses them — they hide behind custom/redefined macros). Annotating both granularities is deliberate: the definition is where the fix lands; the occurrences are what a reviewer sees rendered.
'''

