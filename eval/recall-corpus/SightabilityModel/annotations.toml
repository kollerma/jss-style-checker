# Hand-annotated ground truth for paper "SightabilityModel".
#
# Read the rendered manuscript end-to-end and record EVERY
# JSS-guide violation. Identity tuple is (rule_id, file, line);
# column does NOT participate. See ../README.md for the protocol.
#
# Goal 2 (rule coverage): rich source of CITE-004 (thin -> measurable).
# NOTE on that goal: an end-to-end read found ZERO hardcoded author-year
# citations — the manuscript uses natbib (\citet/\citep) consistently
# throughout. The V2-README projection of "~14 CITE-004 firings" does not
# hold for this paper (it predates the tightened CITE-004). This paper's
# real coverage value is XREF-004 (11 firings) and OPER-003 (5 firings).
#
# This file was SEEDED from precision-review verdicts (eval.db,
# 2026-06-17) and then fully verified by an independent end-to-end read
# on 2026-07-03: every seeded true positive was re-checked against the
# source, the false negatives the linter/seed missed were added, and two
# seeded entries that are actually linter over-fires were demoted to the
# reviewed-FP section at the bottom.
#
# JSS-REFS-003 is populated separately by
# `python -m eval.crossref_doi_lookup` (records the actual DOI); those
# entries are preserved verbatim from the seed and NOT hand-edited.

[meta]
paper_id = "SightabilityModel"
annotator = "Manuel Koller"
date = "2026-07-03"
notes = '''
Verified all 26 seeded TPs and added the false negatives from an independent read. 

Changes vs. seed: 

(1) added CAP-004:40 and CODE-003 585/602/642/654/753 — real violations the current
    linter catches but the 2026-06-17 seed (older rules) omitted; 
(2) added 6 genuine false negatives the linter still misses -
    OPER-004 434/667/674/676 (literal lowercase `var(`/`cov(` in math; 
    OPER-004 only detects \\mathrm{}/\\text{} macro  forms), 
    MARKUP-002:681 (bare `splines` package), CODE-003:533 (`observed~1`; 
    the CODE-003 operator set excludes `~`);
(3) demoted CAP-002:133 and REFS-006:389 to the reviewed-FP section (linter over-fires
    — see bottom); 
(4) removed the bogus XREF-004:278 FP note — SSvar is a genuine orphan-label TP
    (its eqnarray DOES number rows 2-3; the earlier qwen3 'eqnarray doesn't number'
    verdict was wrong). 
    
Secondary-vignette review decisions outside this recall surface were omitted from the
seed and remain out of scope.
'''

