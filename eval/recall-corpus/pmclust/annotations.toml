# Hand-annotated ground truth for paper "pmclust".
#
# Annotation protocol: read the rendered manuscript end-to-end and
# record every JSS-guide violation you spot. Identity tuple is
# (rule_id, file, line); column does NOT participate. See
# eval/recall-corpus/README.md for the full protocol.
#
# Lint surface for recall measurement: `eval-jss recall` runs the
# linter on every .tex / .ltx / .rnw / .rmd / .bib file in this
# directory. The annotator should annotate against the same surface
# the reviewer reads (the rendered .tex / PDF — not the .Rnw source)
# to keep the comparison fair.

[meta]
paper_id = "pmclust"
annotator = "Manuel Koller"             # fill in your name / handle
date = "2026-05-07"
notes = """
pmclust's 00-preamble.tex redefines the JSS-class code environments
(\\Code, \\CodeInput, \\CodeOutput) via \\let\\Code\\@undefined, then
re-binds Code/CodeOutput/Command/Error to listings-based envs. As a
result the linter's CODE-001/002/003 and WIDTH-001 rules — which key
on jss.cls env names — silently miss every code defect inside those
custom envs. The defects are still annotated here against the lines
they appear on, but until the JSS-PRE-009 follow-up (preamble must
not undefine jss.cls code envs) ships and is paired with a generic
"unknown verbatim env" pass, those rules will read 0 % recall on
this paper structurally. See roadmap/follow-ups.md.

REFS-003 (DOI advisory) entries are annotated even though they are
info-severity: every flagged entry has a DOI on crossref.org that
the bib does not record.
"""

