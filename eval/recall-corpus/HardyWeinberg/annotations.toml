#
# The [[violations]] below are SEEDED from precision-review
# verdicts (eval.db, 2026-06-17): each is a review-confirmed
# TRUE POSITIVE — VERIFY it, and add the false negatives the
# linter missed (those are not in eval.db). Reviewed FALSE
# POSITIVES are listed (commented) at the bottom: do NOT add
# them as violations, but confirm the FP judgement as you read.
#
