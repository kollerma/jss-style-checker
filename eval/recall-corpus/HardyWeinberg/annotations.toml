[meta]
paper_id = "HardyWeinberg"
annotator = "Manuel Koller"
date = "2026-06-25"
notes = '''
Seeded from precision review on 2026-06-17: 75 confirmed-TP entries to verify, 3 reviewed FPs recorded below. 24 review decisions on secondary vignettes outside this recall surface were omitted.

Line 371 (and again with \citeyear{Puig2} a few lines down) writes the authors by hand and delegates only the year to natbib:
      Puig, Ginebra and Graffelman~(\citeyear{Puig})
This is a hand-rolled narrative citation — equivalent output to \citet{Puig}, almost certainly done to spell out all three authors (plain \citet truncates 3+ authors to "Puig et al."; \citet*{Puig} would be the idiomatic way to force the full list). Not a violation: CITE-004 only fires on a bare parenthetical year, and here the year comes from \citeyear, so the cite is registered and back-linked. The downside is the typed author names aren't linked to the bib and won't track edits to the entry — a soft style nit, not annotated.
'''

