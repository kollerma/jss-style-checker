# Hand-annotated ground truth for paper "mdsOpt".
#
# Annotation protocol: read the rendered manuscript end-to-end and
# record every JSS-guide violation you spot. Identity tuple is
# (rule_id, file, line); column does NOT participate. See
# eval/recall-corpus/README.md for the full protocol.
#
# Conventions (matching the v1 papers): CODE-001 / CODE-003 carry one
# entry per offending code block; bib-rule entries anchor at the
# entry's @-line.

[meta]
paper_id = "mdsOpt"
annotator = "Claude Code (AI annotator)"
date = "2026-06-11"
notes = """
AI-produced annotation from an independent end-to-end read of
mdsOpt.ltx (1273 loc) and mdsOpt.bib; the linter was not consulted
before annotating (reconciliation pass afterwards per README step 5).
Pending human verification. Dominant defect classes: parenthesised
\\cite without natbib commands, unspaced code (commas / <- / =),
comments inside CodeInput, captions without trailing periods, bare
function and argument names in prose. Borderline cases left
unannotated for human judgement: \\Plaintitle containing "--"
(PRE-006 fires; arguably plain text), per-table-cell package
citations, x1..x16 variable labels in prose. Known linter FPs
observed here (not annotated): MARKUP-001 on the group label "C"
at .ltx lines 543/573.
"""

